<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<title>Vik's News</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1317;
    --card: #171d24;
    --card-raise: #1b222a;
    --line: #242d36;
    --text: #e7ecf0;
    --muted: #94a1ad;
    --faint: #5f6c78;
    --optics: #5fd4e6;
    --memory: #efc356;
    --packaging: #b18cf0;
    --networking: #72d48d;
    --power: #f0854e;
    --ai-infra: #6e9bef;
    --display: "Space Grotesk", system-ui, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, monospace;
    --body: system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--body);
    font-size: 15px;
    line-height: 1.5;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 0 16px 80px; }

  /* Masthead */
  header { padding-top: 28px; }
  .mast { display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; }
  .eyebrow {
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--faint);
    margin-bottom: 4px;
  }
  h1 {
    font-family: var(--display);
    font-weight: 600;
    font-size: 26px;
    letter-spacing: -0.01em;
    margin: 0;
  }
  .status {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    background: none;
    border: none;
    padding: 4px 0;
    text-align: right;
    cursor: default;
    line-height: 1.6;
  }
  .status.has-failures { cursor: pointer; }
  .status .warn { color: var(--memory); }
  .spectrum {
    height: 2px;
    margin-top: 14px;
    border-radius: 1px;
    background: linear-gradient(90deg,
      var(--packaging), var(--ai-infra), var(--optics),
      var(--networking), var(--memory), var(--power));
  }
  .failures {
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--memory);
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 10px 12px;
    margin-top: 12px;
  }

  /* Filters */
  .filters {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    padding: 16px 0 4px;
  }
  .filters::-webkit-scrollbar { display: none; }
  .chip {
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--muted);
    background: none;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 5px 12px;
    white-space: nowrap;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .chip .swatch { width: 6px; height: 6px; border-radius: 50%; background: var(--tc, var(--muted)); }
  .chip.active { color: var(--text); border-color: var(--tc, var(--muted)); background: var(--card); }
  .chip-gap { border-left: 1px solid var(--line); margin: 4px 2px; }

  /* Search */
  .search { position: relative; padding-top: 10px; }
  .search input {
    width: 100%;
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--text);
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 60px 8px 12px;
    outline: none;
  }
  .search input::placeholder { color: var(--faint); }
  .search input:focus { border-color: var(--optics); }
  .search .hits {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(calc(-50% + 5px));
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--faint);
    pointer-events: none;
  }

  /* Feed */
  .day {
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--faint);
    padding: 22px 0 10px;
    position: sticky;
    top: 0;
    background: linear-gradient(var(--bg) 82%, transparent);
    z-index: 2;
  }
  .card {
    --tc: var(--ai-infra);
    background: var(--card);
    border: 1px solid var(--line);
    border-left: 3px solid var(--tc);
    border-radius: 10px;
    padding: 13px 15px 12px;
    margin-bottom: 10px;
  }
  @media (prefers-reduced-motion: no-preference) {
    .card { transition: background 0.15s ease, transform 0.15s ease; }
    .card:hover { background: var(--card-raise); transform: translateY(-1px); }
  }
  .t-optics { --tc: var(--optics); }
  .t-memory { --tc: var(--memory); }
  .t-packaging { --tc: var(--packaging); }
  .t-networking { --tc: var(--networking); }
  .t-power { --tc: var(--power); }
  .t-ai-infra { --tc: var(--ai-infra); }
  .meta {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--faint);
  }
  .meta .src { color: var(--muted); }
  .meta .tag { margin-left: auto; text-transform: none; letter-spacing: 0.02em; }
  .tag-deep-dive {
    color: var(--tc);
    background: color-mix(in srgb, var(--tc) 14%, transparent);
    border-radius: 5px;
    padding: 2px 7px;
    font-weight: 500;
  }
  .tag-digest {
    color: var(--muted);
    border: 1px solid var(--line);
    border-radius: 5px;
    padding: 1px 7px;
  }
  .headline {
    display: block;
    font-family: var(--display);
    font-weight: 500;
    font-size: 15.5px;
    line-height: 1.35;
    color: var(--text);
    text-decoration: none;
    margin: 7px 0 5px;
  }
  .headline:hover { text-decoration: underline; text-underline-offset: 3px; }
  .headline:focus-visible, .chip:focus-visible, .status:focus-visible {
    outline: 2px solid var(--optics);
    outline-offset: 2px;
    border-radius: 4px;
  }
  .why { margin: 0; font-size: 13.5px; color: var(--muted); }
  .empty {
    text-align: center;
    color: var(--faint);
    font-family: var(--mono);
    font-size: 12px;
    padding: 56px 0;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="mast">
      <div>
        <div class="eyebrow">Daily semiconductor feed</div>
        <h1>Vik&#8217;s News</h1>
      </div>
      <button class="status" id="status" aria-live="polite">Loading&#8230;</button>
    </div>
    <div class="spectrum" role="presentation"></div>
    <div class="failures" id="failures" hidden></div>
    <nav class="filters" id="filters" aria-label="Filters"></nav>
    <div class="search">
      <input id="search" type="search" placeholder="Search two weeks of news&#8230; ( / )"
             aria-label="Search news" autocomplete="off">
      <span class="hits" id="hits"></span>
    </div>
  </header>
  <main id="feed"></main>
</div>

<script>
(function () {
  "use strict";

  var TOPICS = {
    "optics": "Optics",
    "memory": "Memory",
    "packaging": "Packaging",
    "networking": "Networking",
    "power": "Power",
    "ai-infra": "AI infra"
  };
  var TAGS = { "deep-dive": "Deep-dive", "digest": "Digest" };

  var items = [];
  var meta = {};
  var topicFilter = null;
  var tagFilter = null;
  var query = "";

  var $status = document.getElementById("status");
  var $failures = document.getElementById("failures");
  var $filters = document.getElementById("filters");
  var $feed = document.getElementById("feed");
  var $search = document.getElementById("search");
  var $hits = document.getElementById("hits");

  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  function pad(n) { return n < 10 ? "0" + n : "" + n; }

  function dayLabel(iso) {
    var d = new Date(iso + "T00:00:00");
    var now = new Date();
    var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    var diff = Math.round((today - d) / 86400000);
    var names = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
    var months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun",
                  "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    var label = names[d.getDay()] + " " + d.getDate() + " " + months[d.getMonth()];
    if (diff === 0) return "Today &#183; " + label;
    if (diff === 1) return "Yesterday &#183; " + label;
    return label;
  }

  function timeOf(iso) {
    if (!iso) return "";
    var d = new Date(iso);
    if (isNaN(d)) return "";
    return pad(d.getHours()) + ":" + pad(d.getMinutes());
  }

  function renderStatus() {
    if (!meta.generated_at) {
      $status.innerHTML = meta.preview
        ? "Preview &#183; sample items"
        : "No runs yet &#8212;&#8202;run the workflow once";
      return;
    }
    var sources = meta.sources || [];
    var ok = sources.filter(function (s) { return s.ok; }).length;
    var failed = sources.filter(function (s) { return !s.ok; });
    var when = new Date(meta.generated_at);
    var stamp = "Updated " + pad(when.getHours()) + ":" + pad(when.getMinutes());
    var line = stamp + " &#183; " + ok + "/" + sources.length + " sources";
    if (meta.preview) line = "Preview &#183; " + line;
    if (failed.length) {
      $status.innerHTML = line.replace(/(\d+\/\d+ sources)/, '<span class="warn">$1</span>');
      $status.classList.add("has-failures");
      $status.setAttribute("aria-expanded", "false");
      $failures.textContent = "Failing: " + failed.map(function (s) { return s.name; }).join(", ");
      $status.onclick = function () {
        var open = !$failures.hidden;
        $failures.hidden = open;
        $status.setAttribute("aria-expanded", String(!open));
      };
    } else {
      $status.innerHTML = line;
    }
  }

  function chip(label, color, active, onClick) {
    var b = document.createElement("button");
    b.className = "chip" + (active ? " active" : "");
    if (color) {
      b.style.setProperty("--tc", color);
      b.innerHTML = '<span class="swatch"></span>' + esc(label);
    } else {
      b.textContent = label;
    }
    b.onclick = onClick;
    return b;
  }

  function topicColor(key) {
    return getComputedStyle(document.documentElement).getPropertyValue("--" + key).trim();
  }

  function renderFilters() {
    $filters.innerHTML = "";
    $filters.appendChild(chip("All", null, !topicFilter && !tagFilter, function () {
      topicFilter = null; tagFilter = null; renderFilters(); renderFeed();
    }));
    Object.keys(TOPICS).forEach(function (key) {
      $filters.appendChild(chip(TOPICS[key], topicColor(key), topicFilter === key, function () {
        topicFilter = topicFilter === key ? null : key; renderFilters(); renderFeed();
      }));
    });
    var gap = document.createElement("span");
    gap.className = "chip-gap";
    $filters.appendChild(gap);
    Object.keys(TAGS).forEach(function (key) {
      $filters.appendChild(chip(TAGS[key], null, tagFilter === key, function () {
        tagFilter = tagFilter === key ? null : key; renderFilters(); renderFeed();
      }));
    });
  }

  function card(item) {
    var topic = TOPICS[item.topic] ? item.topic : "ai-infra";
    var tagHtml = "";
    if (item.tag === "deep-dive") tagHtml = '<span class="tag tag-deep-dive">deep-dive</span>';
    else if (item.tag === "digest") tagHtml = '<span class="tag tag-digest">digest</span>';
    var t = timeOf(item.published);
    return '<article class="card t-' + topic + '">' +
      '<div class="meta"><span class="src">' + esc(item.source) + "</span>" +
      (t ? "<span>" + t + "</span>" : "") + tagHtml + "</div>" +
      '<a class="headline" href="' + esc(item.url) + '" target="_blank" rel="noopener">' +
      esc(item.title) + "</a>" +
      '<p class="why">' + esc(item.why) + "</p>" +
      "</article>";
  }

  function matches(item, terms) {
    if (!terms.length) return true;
    var hay = (item.title + " " + item.why + " " + item.source + " " +
               item.topic + " " + item.tag).toLowerCase();
    return terms.every(function (t) { return hay.indexOf(t) !== -1; });
  }

  function renderFeed() {
    var terms = query.toLowerCase().split(/\s+/).filter(Boolean);
    var visible = items.filter(function (i) {
      if (topicFilter && i.topic !== topicFilter) return false;
      if (tagFilter && i.tag !== tagFilter) return false;
      return matches(i, terms);
    });
    $hits.textContent = terms.length ? visible.length + " hit" + (visible.length === 1 ? "" : "s") : "";
    if (!visible.length) {
      $feed.innerHTML = '<div class="empty">' +
        (terms.length ? "No matches in the last two weeks."
          : items.length ? "Nothing under this filter." : "No items yet.") + "</div>";
      return;
    }
    var html = "";
    var lastDay = null;
    visible.forEach(function (item) {
      if (item.date !== lastDay) {
        lastDay = item.date;
        html += '<h2 class="day">' + dayLabel(item.date) + "</h2>";
      }
      html += card(item);
    });
    $feed.innerHTML = html;
  }

  function boot(data) {
    items = data.items || [];
    meta = data.meta || {};
    renderStatus();
    renderFilters();
    renderFeed();
  }

  $search.addEventListener("input", function () {
    query = $search.value;
    renderFeed();
  });
  $search.addEventListener("keydown", function (e) {
    if (e.key === "Escape") {
      $search.value = "";
      query = "";
      renderFeed();
      $search.blur();
    }
  });
  document.addEventListener("keydown", function (e) {
    if (e.key === "/" && document.activeElement !== $search) {
      e.preventDefault();
      $search.focus();
    }
  });

  if (window.SAMPLE_DATA) {
    boot(window.SAMPLE_DATA);
  } else {
    fetch("feed.json?ts=" + Date.now(), { cache: "no-store" })
      .then(function (r) { return r.json(); })
      .then(boot)
      .catch(function () {
        $status.textContent = "feed.json missing";
        $feed.innerHTML = '<div class="empty">Could not load feed.json. ' +
          "Run the workflow once, then reload.</div>";
      });
  }
})();
</script>
</body>
</html>
